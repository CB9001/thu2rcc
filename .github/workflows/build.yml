name: Build Executables

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: thu2rcc-linux
            binary_src: build/thu2rcc
          - os: windows-2022
            artifact_name: thu2rcc-windows.exe
            binary_src: build/thu2rcc.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC Environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.4.1'

      - name: Log CUDA Version Info
        run: nvcc --version

      - name: Configure CMake
        run: >
          cmake -G Ninja -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CUDA_ARCHITECTURES="52;60;61;70;75;80;86;89"

      - name: Build Executable
        run: cmake --build build --config Release

      - name: Prepare Artifact
        shell: bash
        run: |
          cp ${{ matrix.binary_src }} ./${{ matrix.artifact_name }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.artifact_name }}
